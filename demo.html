<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research Report — Live (API-backed)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230F766E'/%3E%3Ccircle cx='12' cy='12' r='4.5' fill='none' stroke='%23FBFAF8' stroke-width='2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/styles.css">
<style>
  /* Demo-only chrome layered over the shared report styles. */
  .demo-bar { display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    max-width:760px; margin:18px auto 0; padding:0 24px; }
  .demo-bar input { flex:1; min-width:240px; font:inherit; padding:10px 14px;
    border:1px solid var(--line); border-radius:10px; }
  .demo-bar button { font:inherit; font-weight:600; padding:10px 18px; border:none;
    border-radius:10px; background:var(--accent); color:#fff; cursor:pointer; }
  .demo-status { max-width:760px; margin:12px auto 0; padding:0 24px; font:13px/1.5 'IBM Plex Mono',monospace;
    color:#6B6B63; display:flex; align-items:center; gap:10px; }
  .demo-status__bar { flex:1; height:6px; background:var(--line-soft); border-radius:4px; overflow:hidden; }
  .demo-status__fill { height:100%; width:0; background:var(--accent); transition:width .2s ease; }
  .demo-meta { max-width:760px; margin:6px auto 0; padding:0 24px; font:12px 'IBM Plex Mono',monospace; color:#9A9A93; }
</style>
</head>
<body>

<div id="rr-root">
  <header class="rr-header">
    <div class="rr-header__inner">
      <div class="rr-brand">
        <div class="rr-brand__mark"><div class="rr-brand__dot"></div></div>
        <span class="rr-brand__name">Corpus</span>
        <span class="rr-tag">Live</span>
      </div>
    </div>
  </header>

  <div class="demo-bar">
    <input id="demo-q" type="search" placeholder="Ask a research question…"
      value="effectiveness of mobile health interventions">
    <button id="demo-go" type="button">Generate</button>
  </div>
  <div class="demo-status">
    <span id="demo-phase">idle</span>
    <span class="demo-status__bar"><span id="demo-fill" class="demo-status__fill"></span></span>
  </div>
  <div class="demo-meta" id="demo-meta"></div>

  <div class="rr-grid">
    <main class="rr-reading" id="rr-reading" style="grid-column:1 / -1;"></main>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/report-view.js"></script>
<script>
/* Thin demo harness: a search box on top of the shared CorpusReportView.
   All streaming + rendering + behaviors live in js/report-view.js — this page
   only creates a report and mounts the view, proving the module is reusable. */
(function () {
  'use strict';
  var params = new URLSearchParams(location.search);
  var api = new CorpusApi({ baseUrl: params.get('api') || undefined });

  var els = {
    q: document.getElementById('demo-q'),
    go: document.getElementById('demo-go'),
    phase: document.getElementById('demo-phase'),
    fill: document.getElementById('demo-fill'),
    meta: document.getElementById('demo-meta'),
    reading: document.getElementById('rr-reading')
  };

  function setStatus(phase, progress) {
    els.phase.textContent = phase;
    els.fill.style.width = Math.round((progress || 0) * 100) + '%';
  }

  function generate() {
    els.go.disabled = true;
    setStatus('queued', 0.02);
    var query = { question: els.q.value.trim(), mode: 'keyword', filters: {} };

    api.createReport(query).then(function (job) {
      CorpusReportView.mount({
        api: api,
        reportId: job.reportId,
        root: els.reading,
        onStatus: function (d) { setStatus(d.phase, d.progress); },
        onDone: function (report) {
          setStatus('complete', 1);
          els.go.disabled = false;
          els.meta.textContent = 'reportId ' + report.id + ' · ' + report.blocks.length +
            ' blocks · ' + report.references.length + ' references · corpus ' + report.metrics.corpusSize;
        },
        onError: function (e) {
          setStatus('error: ' + (e.message || e.code), 1);
          els.go.disabled = false;
        }
      });
    }).catch(function (e) {
      setStatus('error: ' + e.message, 1);
      els.go.disabled = false;
    });
  }

  els.go.addEventListener('click', generate);

  // Surface the facet catalog (proves /facets), then auto-run once.
  api.getFacets().then(function (f) {
    els.meta.textContent = f.fieldsOfStudy.length + ' fields · ' + f.countries.length + ' countries · ' +
      f.sources.length + ' sources';
  }).catch(function (e) {
    els.meta.textContent = 'facets unavailable: ' + e.message;
  });

  if (params.get('autorun') !== '0') generate();
})();
</script>
</body>
</html>
